repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: ruff fix
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-check-strict
        name: ruff check (strict)
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
